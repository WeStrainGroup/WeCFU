<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WeCFU</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1 data-i18n="appTitle">WeCFU</h1>
    <div id="top-controls">
      <button id="btn-run" data-i18n="countAll">Count all</button>
      <button id="btn-export-csv" data-i18n="exportCSV">Export CSV</button>
      <button id="btn-export-zip" data-i18n="exportBundle">Export bundle</button>
      <button id="btn-help" data-i18n="helpButton" title="Help">Help</button>
      <select id="lang-select" title="Language" data-i18n-title="language"></select>
      <span id="status" class="muted"></span>
    </div>
  </header>

  <main>
    <aside id="sidebar">
      <div id="dropzone">
        <p><span data-i18n="dropHint">Drop image files or a folder here</span><br/>
           <span class="muted" data-i18n="dropSubHint">(symlinked, your originals are not modified)</span></p>
        <p class="muted" data-i18n="pasteHint">Or paste an absolute path:</p>
        <input id="path-input" placeholder="/path/to/plate/photos" />
        <button id="btn-ingest" data-i18n="ingestBtn">Ingest path</button>
      </div>
      <div id="image-list"></div>
    </aside>

    <section id="viewer">
      <div id="viewer-header">
        <div>
          <span id="current-name" class="muted" data-i18n="selectAnImage">select an image</span>
          <span id="meta-tag"></span>
        </div>
        <div>
          <span id="count-badge" class="badge">0 CFU</span>
          <button id="btn-undo" title="Undo (Cmd/Ctrl Z)" data-i18n="undo">↶ Undo</button>
          <button id="btn-rerun" data-i18n="countOne">Recount</button>
        </div>
      </div>

      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>

      <div id="legend" class="muted">
        <span class="dot dot-cv"></span><span data-i18n="legendAuto">Machine</span> ·
        <span class="dot dot-manual"></span><span data-i18n="legendManual">Manual</span> ·
        <span data-i18n="legend"></span>
      </div>

      <div id="params">
        <!-- Row 1: high-level action — pick a preset, then Apply. -->
        <div class="params-row">
          <label><span data-i18n="presetLabel">Preset</span>
            <select id="preset-select">
              <option value="white"  data-i18n="presetWhite">White colonies (default)</option>
              <option value="cream"  data-i18n="presetCream">Cream or pale yellow</option>
              <option value="yellow" data-i18n="presetYellow">Yellow colonies</option>
              <option value="any"    data-i18n="presetAny">Any bright</option>
              <option value="custom" data-i18n="presetCustom">Custom</option>
            </select>
          </label>
          <button id="btn-apply-params" data-i18n="applyParams">Apply and recount</button>
        </div>
        <!-- Row 2: all six algorithm parameters. -->
        <div class="params-row">
          <label><span data-i18n="paramMinValue">Min value</span> <input type="number" id="p-min-value" value="200" min="0" max="255"/></label>
          <label><span data-i18n="paramMaxSat">Max saturation</span> <input type="number" id="p-max-sat" value="60" min="0" max="255"/></label>
          <label><span data-i18n="paramInset">Plate inset</span> <input type="number" id="p-inset" value="0.82" step="0.01" min="0.5" max="1.0"/></label>
          <label><span data-i18n="paramCirc">Min circularity</span> <input type="number" id="p-circ" value="0.55" step="0.05" min="0" max="1"/></label>
          <label><span data-i18n="paramArea">Min area frac</span> <input type="number" id="p-min-area" value="0.0001" step="0.00005" min="0" max="0.01"/></label>
          <label><span data-i18n="paramPeak">Peak min distance</span> <input type="number" id="p-peak" value="15" min="2" max="80"/></label>
        </div>
        <!-- Row 3: pure UI helpers (no algorithm impact). -->
        <div class="params-row">
          <label><span data-i18n="paramRadius">New colony radius</span> <input type="number" id="p-radius" value="40" min="3" max="300"/></label>
          <label><input type="checkbox" id="p-preview"/> <span data-i18n="livePreview">Live threshold preview</span></label>
        </div>
      </div>

      <div id="notes-bar">
        <label data-i18n="notesLabel">Notes</label>
        <input id="notes-input" data-i18n-placeholder="notesPlaceholder" placeholder="Per image note, stored in CSV"/>
      </div>
    </section>
  </main>

  <!-- Help modal -->
  <div id="modal-backdrop" hidden>
    <div id="help-modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 data-i18n="helpTitle">WeCFU quick help</h2>
        <button id="btn-help-close" data-i18n="helpClose">Close</button>
      </div>
      <div id="help-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Export modal -->
  <div id="export-backdrop" hidden>
    <div id="export-modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 data-i18n="exportTitle">Export</h2>
        <button id="btn-export-cancel" data-i18n="exportCancel">Cancel</button>
      </div>
      <div class="modal-body">
        <label class="stacked"><span data-i18n="exportFileName">File name</span>
          <input id="export-filename" />
        </label>
        <div id="export-format-row" hidden>
          <label><input type="radio" name="export-format" value="csv" checked/> <span data-i18n="exportFormatCSV">CSV only (counts)</span></label>
          <label><input type="radio" name="export-format" value="zip"/> <span data-i18n="exportFormatZip">Bundle (CSV plus annotated images and JSON)</span></label>
        </div>
        <label class="stacked"><span data-i18n="exportSaveLocation">Save to</span>
          <button id="export-location-btn" type="button" data-i18n="exportSaveLocationDefault">Downloads (browser default)</button>
        </label>
        <div class="modal-actions">
          <button id="btn-export-confirm" class="primary" data-i18n="exportConfirm">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
