{% set name = "wecfu" %}
{% set version = "0.1.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # Use git so .gitignore is honoured — keeps `data/`, build artefacts,
  # and the user's input photos OUT of the package snapshot.
  git_url: .
  git_rev: HEAD

build:
  number: 0
  noarch: python
  include_recipe: false   # don't embed the recipe+source into info/ (smaller)
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --ignore-installed"
  entry_points:
    - wecfu = wecfu.cli:main

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.10
    - numpy
    - scipy
    - scikit-image
    - py-opencv
    - pillow
    - pandas
    - fastapi
    - uvicorn
    - python-multipart

test:
  imports:
    - wecfu
    - wecfu.cli
    - wecfu.plate
    - wecfu.segment
    - wecfu.pipeline
    - wecfu.server.app
  commands:
    - wecfu --help

about:
  home: https://github.com/WeStrainGroup/WeCFU
  license: MIT
  license_file: LICENSE
  summary: "WeCFU — a friendly, interactive, web-based colony counter for petri dish photos"
  description: |
    WeCFU is a local web tool for counting colonies on petri-dish photos.
    Drop images in, get an automatic count, click to correct, export.
    Multilingual UI, click-to-add / right-click-to-delete editing,
    tunable parameters with a live threshold preview, and a CSV / zip
    export with annotated images.

extra:
  recipe-maintainers:
    - WeStrainGroup
